set-option -g default-terminal "screen-256color"
set -q -g status-utf8 on
set -g base-index 1
setw -g pane-base-index 1
setw -q -g utf8 on
set -g set-clipboard on
set -g mouse on

# Tame wheel scrolling inside tmux by scrolling a single line per wheel event.
bind -n WheelUpPane if-shell -F -t = '#{mouse_any_flag}' 'send-keys -M' 'copy-mode -e \; send-keys -X -N 1 scroll-up'
bind -n WheelDownPane if-shell -F -t = '#{pane_in_mode}' 'send-keys -X -N 1 scroll-down' 'send-keys -M'
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down
set -g status-position top
set -g status-bg black
set -s escape-time 0
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Enable shift+enter
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Use vi-style copy mode
setw -g mode-keys vi

# Use y to copy to system clipboard (requires xclip)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"


## Make prefix Ctrl + Space
unbind C-b
bind-key C-Space send-prefix
set-option -g prefix C-Space

## Custom binds
bind r command-prompt "rename-window %%"
bind R source-file ~/.tmux.conf \; display-message 'Config reloaded...'
bind S choose-session

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @tokyo-night-tmux_theme "night"
set -g @tokyo-night-tmux_pane_id_style hide
set -g @tokyo-night-tmux_zoom_id_style sub
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_show_git 1
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_show_netspeed 0

# set -g @sessionx-bind "space"
run '~/.tmux/plugins/tpm/tpm'
