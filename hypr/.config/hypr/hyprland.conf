# Monitors
monitor = DP-4, 2560x1440@240, 0x0, 1
monitor = DP-5, 2560x1440@180, 2560x0, 1

env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = XDG_SESSION_TYPE,wayland
env = WLR_NO_HARDWARE_CURSORS,1
env = GTK_THEME,Adwaita:dark

exec-once = /home/ferdi/.local/bin/theme-bar
exec-once = /home/ferdi/.local/bin/theme-activity-daemon
exec-once = hyprpaper
exec-once = sleep 1 && /home/ferdi/.local/bin/restore-wallpaper-theme
exec-once = mako
exec-once = /home/ferdi/.local/bin/apply-dark-mode
exec-once = sleep 3 && hyprctl reload

input {
	kb_layout = us
	follow_mouse = 1
	repeat_delay = 250
	repeat_rate = 44
}

general {
	gaps_in = 5
	gaps_out = 10
	border_size = 2
	col.active_border = rgba(cdd6f4ff)
	col.inactive_border = rgba(595959aa)
	layout = dwindle
}

source = ~/.config/hypr/themes/current.conf

misc {
	vrr = 1
}

animations {
    enabled = yes

    bezier = snappy, 0.25, 0.9, 0.1, 1.02
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    # Duration is in deciseconds (1 = 100ms)
    animation = windows, 1, 2, snappy
    animation = windowsOut, 1, 2, snappy, popin 80%
    animation = border, 1, 3, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 2, default
    animation = layers, 1, 2, snappy, fade
    animation = workspaces, 1, 2, snappy
}

layerrule = animation fade, match:namespace notifications

# Workspace assignments — 1-5 left, 6-10 right
workspace = 1, monitor:DP-4, default:true
workspace = 2, monitor:DP-4
workspace = 3, monitor:DP-4
workspace = 4, monitor:DP-4
workspace = 5, monitor:DP-4
workspace = 6, monitor:DP-5, default:true
workspace = 7, monitor:DP-5
workspace = 8, monitor:DP-5
workspace = 9, monitor:DP-5
workspace = 10, monitor:DP-5

bind = SUPER, Return, exec, ghostty
bind = SUPER, Q, killactive
bind = SUPER, Space, exec, rofi -show drun
bind = SUPER SHIFT, Space, exec, /home/ferdi/.local/bin/theme-switcher
bind = SUPER, F, fullscreen
bind = SUPER, V, togglefloating
bind = SUPER SHIFT, E, exit
bind = SUPER SHIFT, S, exec, /home/ferdi/.local/bin/take-screenshot

# Mouse-driven window actions similar to bspwm
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Left monitor workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Right monitor workspaces
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Move window to other monitor (SUPER+< and SUPER+>)
bind = SUPER, comma, movewindow, mon:-1
bind = SUPER, period, movewindow, mon:+1

bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d
