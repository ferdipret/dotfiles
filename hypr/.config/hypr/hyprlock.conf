source = ~/.config/hypr/themes/lock.conf

$font = JetBrainsMono Nerd Font

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = snappy, 0.25, 0.9, 0.1, 1.02
    animation = fadeIn, 1, 2, snappy
    animation = fadeOut, 1, 2, snappy
    animation = inputFieldDots, 1, 2, snappy
}

background {
    monitor =
    color = $lock_bg
}

label {
    monitor =
    text = $TIME
    font_size = 72
    font_family = $font
    font_color = $lock_text
    position = 0, 96
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 18
    font_family = $font
    font_color = $lock_text_muted
    position = 0, 34
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 360, 54
    outline_thickness = 2
    rounding = $lock_radius
    inner_color = $lock_surface
    outer_color = $lock_border
    check_color = $lock_primary
    fail_color = $lock_error
    font_color = $lock_text
    font_family = $font
    placeholder_text = Password
    fail_text = $PAMFAIL
    dots_spacing = 0.25
    fade_on_empty = false
    position = 0, -56
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "locked"
    font_size = 12
    font_family = $font
    font_color = $lock_text_muted
    position = 0, -112
    halign = center
    valign = center
}
